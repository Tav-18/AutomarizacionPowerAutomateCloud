{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Power Automate Best Practices Analyzer{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{% static 'analyzer/styles.css' %}?v=3">
</head>
<body>

  <header class="beecker-header">
    <div class="bh-left">
      <img src="{% static 'analyzer/b-logo.png' %}" alt="Company logo">
    </div>

    <div class="bh-center">
      <h1 class="bh-title">Power Automate Best Practices Analyzer</h1>
      <div class="upload-sub">Local demo · Solution ZIP · PDF Evidence</div>
    </div>

    <div class="bh-right">
      <img src="{% static 'analyzer/logo.png' %}" alt="Company logo">
    </div>
  </header>

<main class="container">
  {% block content %}{% endblock %}
</main>

{% block fullbleed %}{% endblock %}

</body>
</html>
